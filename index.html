<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>One Fair Justice - Kilroid & Glitch</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; color:#fff; font-family:'Segoe UI',sans-serif; }
    #bg { position:fixed; inset:0; background:url('https://images.unsplash.com/photo-1543508282-6319cf4d5a5e?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover; opacity:0.8; animation:flicker 10s infinite alternate; }
    @keyframes flicker { 0%,100%{opacity:0.8;} 50%{opacity:0.75;} }

    .container { position:relative; height:100vh; display:flex; align-items:center; justify-content:center; }
    #hero { max-width:60%; height:auto; animation:float 6s ease-in-out infinite, glow 4s infinite alternate; z-index:2; }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-30px);} }
    @keyframes glow { from {filter:drop-shadow(0 0 20px #00ffff);} to {filter:drop-shadow(0 0 40px #ff00ff);} }

    .product { position:absolute; width:180px; height:auto; cursor:pointer; animation:pulse 5s infinite, rotateSlow 20s linear infinite; filter:drop-shadow(0 0 15px #0ff); }
    #hoodie1 { top:10%; left:5%; }
    #hoodie2 { bottom:15%; right:5%; }
    #mug { top:20%; right:10%; animation:rotateSlow 15s linear infinite; }
    #justice { top:5%; right:5%; width:150px; opacity:0.9; }
    #watch { bottom:10%; left:10%; width:200px; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
    @keyframes rotateSlow { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

    #chat-ui { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:80%; max-width:600px; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); padding:15px; border-radius:20px; border:1px solid #0ff; z-index:10; text-align:center; }
    #input { width:70%; padding:12px; border:none; border-radius:30px 0 0 30px; background:#111; color:#fff; }
    #send { padding:12px 20px; border:none; background:#0ff; color:#000; border-radius:0 30px 30px 0; cursor:pointer; }
    #mic-btn { margin-left:10px; background:#f0f; color:#000; border:none; padding:12px; border-radius:50%; cursor:pointer; }
    #toggle { margin:10px; padding:8px 15px; background:#444; color:#fff; border:none; border-radius:20px; cursor:pointer; }

    #response { margin-top:15px; padding:15px; background:rgba(255,255,255,0.1); border-radius:15px; min-height:60px; }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div class="container">
    <!-- Main hero - use your main dunk pic base64 or URL -->
    <img id="hero" src="https://i.imgur.com/your-main-dunk.jpg" alt="Kilroid & Glitch Dunkin'">

    <!-- Floating products - swap src with your base64/URLs -->
    <img class="product" id="hoodie1" src="https://i.imgur.com/your-hoodie1.jpg" onclick="window.open('https://owenSonicInfinity.github.io','_blank')" alt="Hoodie 1">
    <img class="product" id="hoodie2" src="https://i.imgur.com/your-hoodie2.jpg" onclick="window.open('https://owenSonicInfinity.github.io','_blank')" alt="Hoodie 2">
    <img class="product" id="mug" src="https://i.imgur.com/your-mug.jpg" onclick="window.open('https://owenSonicInfinity.github.io','_blank')" alt="Mug">
    <img class="product" id="justice" src="https://i.imgur.com/your-justice-cover.jpg" onclick="window.open('https://owenSonicInfinity.github.io','_blank')" alt="One Fair Justice">
    <img class="product" id="watch" src="https://i.imgur.com/your-watch-banner.jpg" onclick="window.open('https://owenSonicInfinity.github.io','_blank')" alt="Watch in Action">
  </div>

  <!-- Chat UI -->
  <div id="chat-ui">
    <input id="api-key" type="text" placeholder="Paste your OpenAI API key here (test mode)" style="width:100%; margin-bottom:10px; padding:10px; border-radius:10px;">
    <div>
      <input id="input" type="text" placeholder="Type or speak to Kilroid & Glitch...">
      <button id="send">Send</button>
      <button id="mic-btn">🎤 Mic</button>
    </div>
    <button id="toggle">Toggle Mic/Text</button>
    <div id="response">Yo, hit mic or type—let's ball! ⚡</div>
  </div>

  <!-- Crowd noise loop (low vol) - swap with free MP3 URL -->
  <audio id="crowd" loop volume="0.15">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-crowd-cheering-at-a-basketball-game-205.mp3" type="audio/mpeg">
  </audio>

  <script>
    const crowd = document.getElementById('crowd');
    crowd.play().catch(e => console.log("Autoplay blocked—click page to start sound"));

    // Speech synth intro
    window.onload = () => {
      if ('speechSynthesis' in window) {
        let intro = new SpeechSynthesisUtterance("Yo, what's good? Kilroid here—ready to hoop? Glitch: Heh, don't short-circuit on us...");
        intro.rate = 1.05; intro.pitch = 1.1;
        speechSynthesis.speak(intro);
      }
    };

    // Chat logic (basic OpenAI fetch - paste key)
    const sendBtn = document.getElementById('send');
    const input = document.getElementById('input');
    const responseDiv = document.getElementById('response');
    const keyInput = document.getElementById('api-key');

    sendBtn.onclick = async () => {
      const msg = input.value.trim();
      if (!msg) return;
      const key = keyInput.value.trim();
      if (!key) { responseDiv.innerHTML = "Need that API key first, fam."; return; }

      responseDiv.innerHTML = "Thinking...";
      try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${key}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {role: "system", content: "You are Kilroid & Glitch, imperfect roid kids at human school. Kilroid: hype, heart-first, fun. Glitch: glitchy, overthink, sarcastic. Respond in character, no overlap, take turns if both talk. Keep kid-friendly, hip-hop cool."},
              {role: "user", content: msg}
            ],
            max_tokens: 150
          })
        });
        const data = await res.json();
        responseDiv.innerHTML = data.choices[0].message.content;
        speak(data.choices[0].message.content); // voice reply
      } catch(e) {
        responseDiv.innerHTML = "Glitch: API error... try again? " + e.message;
      }
      input.value = '';
    };

    // Mic input
    let recognition;
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      recognition.onresult = e => {
        input.value = e.results[0][0].transcript;
        sendBtn.click(); // auto-send or change to manual
      };
    }
    document.getElementById('mic-btn').onclick = () => {
      if (recognition) recognition.start();
      else alert("Mic not supported in this browser.");
    };

    // Voice reply function
    function speak(text) {
      if ('speechSynthesis' in window) {
        let utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.0; utter.pitch = 0.9 + Math.random()*0.2; // random glitch pitch
        speechSynthesis.speak(utter);
      }
    }

    // Toggle placeholder (expand if needed)
    document.getElementById('toggle').onclick = () => alert("Mic/Text toggle—mic active now!");
  </script>
</body>
</html>
